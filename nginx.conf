server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro buduje /kolekcja/index.html — obsłuż też wariant bez ukośnika
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # długi cache dla statyki (zdjęcia, fonty, css, js)
    location ~* \.(?:jpg|jpeg|png|svg|webp|ico|woff2?|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
